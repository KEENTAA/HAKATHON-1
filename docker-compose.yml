version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=arca_personal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ms-personal:
    build: ./ms-personal
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/arca_personal
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; import sys; exit(0) if urllib.request.urlopen('http://localhost:8000/health').getcode() == 200 else exit(1)"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms-vacaciones:
    build: ./ms-vacaciones
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/arca_personal
    ports:
      - "8002:8000"
    depends_on:
      ms-personal:
        condition: service_healthy

  ms-contratos:
    build: ./ms-contratos
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/arca_personal
    ports:
      - "8003:8000"
    depends_on:
      ms-personal:
        condition: service_healthy

  ms-boletas:
    build: ./ms-boletas
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/arca_personal
    ports:
      - "8004:8000"
    depends_on:
      ms-personal:
        condition: service_healthy

  frontend:
    build: ./Frontend-ARCA
    ports:
      - "4200:80"
    depends_on:
      - ms-personal
      - ms-vacaciones
      - ms-contratos
      - ms-boletas
