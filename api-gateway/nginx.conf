events {
    worker_connections 1024;
}

http {
    server {
        listen 8000;

        # ====================================================================
        # MS-PERSONAL: /api/v1/employees, /api/v1/departments, /api/v1/positions
        # ====================================================================
        location /api/v1/employees/ {
            proxy_pass http://ms_personal:8000/api/v1/employees/;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/departments/ {
            proxy_pass http://ms_personal:8000/api/v1/departments/;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/positions/ {
            proxy_pass http://ms_personal:8000/api/v1/positions/;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ====================================================================
        # MS-CONTRATOS: /api/v1/contratos, /api/v1/contratos/*
        # ====================================================================
        location /api/v1/contratos/ {
            proxy_pass http://ms_contratos:8002/api/v1/contratos/;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ====================================================================
        # MODULO BOLETAS: /api/v1/pay-slips, /api/v1/payment-concepts
        # ====================================================================
        location /api/v1/pay-slips/ {
            proxy_pass http://modulo_boletas:8004/api/v1/pay-slips/;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/payment-concepts/ {
            proxy_pass http://modulo_boletas:8004/api/v1/payment-concepts/;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ====================================================================
        # MODULO VACACIONES: /api/v1/vacations
        # ====================================================================
        location /api/v1/vacations/ {
            proxy_pass http://modulo_vacaciones:8006/api/v1/vacations/;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ====================================================================
        # HEALTH CHECKS (opcional, para monitoreo)
        # ====================================================================
        location /health {
            proxy_pass http://ms_personal:8000/health;
            proxy_set_header Host $http_host;
        }

        # ====================================================================
        # CATCH-ALL (opcional, para debug)
        # ====================================================================
        location / {
            return 404 '{"error": "Endpoint no encontrado", "services": ["/api/v1/employees", "/api/v1/departments", "/api/v1/positions", "/api/v1/contratos", "/api/v1/pay-slips", "/api/v1/payment-concepts", "/api/v1/vacations"]}';
            default_type application/json;
        }
    }
}
